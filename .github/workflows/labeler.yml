name: PR Labeler & Codeowner Notify

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/actions/labeler.yml
          sync-labels: true

  notify-codeowners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Comment code owners based on changed files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path')
          > /tmp/owners.txt
          declare -A FILE_TO_OWNER

          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            PATTERN=$(echo "$line" | awk '{print $1}')
            OWNER_LIST=$(echo "$line" | cut -d' ' -f2-)
            PATTERN="${PATTERN#/}"

            for file in $CHANGED_FILES; do
              MATCH=0
              case "$PATTERN" in
                "*")  MATCH=1 ;;
                */)   [[ "$file" == "$PATTERN"* ]] && MATCH=1 ;;
                *.*)  EXT="${PATTERN#\*}"; [[ "$file" == *"$EXT" ]] && MATCH=1 ;;
                */*)  [[ "$file" == "$PATTERN" || "$file" == "$PATTERN"/* ]] && MATCH=1 ;;
                *)    [[ "$(basename "$file")" == "$PATTERN" ]] && MATCH=1 ;;
              esac
              [ "$MATCH" -eq 1 ] && FILE_TO_OWNER["$file"]="$OWNER_LIST"
            done
          done < .github/CODEOWNERS

          for file in "${!FILE_TO_OWNER[@]}"; do
            echo "${FILE_TO_OWNER[$file]}" | tr ' ' '\n' >> /tmp/owners.txt
          done

          UNIQUE_OWNERS=$(sort -u /tmp/owners.txt | sed 's/^/@/' | tr '\n' ' ')

          if [ -z "$UNIQUE_OWNERS" ]; then
            echo "No specific CODEOWNERS matched. Skipping."
            exit 0
          fi

          echo "Owners: $UNIQUE_OWNERS"

          OLD_IDS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            -q '.[] | select(.body | startswith("📂 **Code Owners**")) | .id' 2>/dev/null)
          for id in $OLD_IDS; do
            gh api -X DELETE "/repos/${{ github.repository }}/issues/comments/$id"
          done

          gh pr comment "$PR_NUMBER" --body "📂 **Code Owners** — based on changed files in this PR

          ${UNIQUE_OWNERS}

          <sub>🤖 Generated by labeler workflow</sub>"
