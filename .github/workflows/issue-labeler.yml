name: "Issue & PR auto-labeling"

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isPR   = context.eventName === "pull_request_target";
            const src    = isPR ? context.payload.pull_request : context.payload.issue;
            const title  = (src.title || "").toLowerCase();
            const body   = (src.body || "").toLowerCase();
            const text   = title + " " + body;

            const labels = [];

            // ── 组件 ──
            if (/ssbuffer|splitdataflow|allocmulticache|crossdeps|markop|planCube/i.test(text)) {
              labels.push("ssbuffer");
            }
            if (/autotune|auto_tuning|auto_tune/i.test(text)) {
              labels.push("autotune");
            }

            // ── 类型（复用已有标签）──
            if (/精度|precision|miscompiled|结果不准|结果不对|incorrect result/i.test(text)) {
              labels.push("bug", "performance");
            }
            if (/编译|coredump|compile error|编译失败|NoTritonConfigsError|compilation/i.test(text)) {
              labels.push("bug");
            }
            if (/性能|开箱性能|慢|performance/i.test(text)) {
              labels.push("performance");
            }
            if (/文档|doc |readme|quick.?start|文档出现错误/i.test(text)) {
              labels.push("documentation");
            }
            if (/安装|pip|pypi|install|version.*不匹配|docker/i.test(text)) {
              labels.push("bug");
            }
            if (/社区任务|任务书|开源共建/i.test(text)) {
              labels.push("community-task");
            }

            if (labels.length > 0) {
              const unique = [...new Set(labels)];
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: src.number,
                labels: unique,
              });
              console.log(`Added labels: ${unique.join(", ")}`);
            } else {
              console.log("No labels matched");
            }
